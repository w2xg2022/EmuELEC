	@args.AES2 { type integer }
	@args.AES3 { type integer }
	type hooks
	slave.pcm {
		type hw
		card $CARD
		device 2
				sync_ptr_ioctl false
		format S16_LE
	}
	hooks.0 {
		type ctl_elems
		hook_args [
			{

#
# Configuration for Amlogic AUGE Audio
#
# NOTE(w2xg2022): 廠商BSP核心的這顆音效驅動，MMAP模式下appl_ptr/avail指標
# 同步有bug(hw_ptr持續推進但appl_ptr卡在0、avail溢位到遠超buffer_size)，
# 導致用SDL3/MMAP_INTERLEAVED開音效裝置的程式(如PPSSPP)無限重試耗滿CPU
# 卻完全沒輸出聲音。sync_ptr_ioctl false強制alsa-lib走傳統ioctl而非
# mmap+SYNC_PTR，繞開這個驅動bug，aplay/RA(alsathread)等本來就走這條路徑
# 沒受影響，這裡是補齊MMAP路徑也安全。

AML-AUGESOUND.pcm.default {
	@args [ CARD ]
	@args.CARD { type string }
	type softvol
	slave.pcm {
		type plug
		slave {
			pcm {
				type hw
				card $CARD
				device 1
				sync_ptr_ioctl false
			}
		}
	}
	control {
		name "PCM Playback Volume"
		card $CARD
	}
}

<confdir:pcm/surround71.conf>

AML-AUGESOUND.pcm.surround71.0 {
	@args [ CARD ]
	@args.CARD { type string }
	type softvol
	slave.pcm {
		type plug
		slave {
			pcm {
				type hw
				card $CARD
				device 3
				sync_ptr_ioctl false
			}
		}
	}
	control {
		name "LPCM Playback Volume"
		card $CARD
	}
}

<confdir:pcm/hdmi.conf>

AML-AUGESOUND.pcm.hdmi.0 {
	@args [ CARD AES0 AES1 AES2 AES3 ]
	@args.CARD { type string }
	@args.AES0 { type integer }
	@args.AES1 { type integer }
	@args.AES2 { type integer }
	@args.AES3 { type integer }
	type hooks
	slave.pcm {
		type hw
		card $CARD
		device 0
				sync_ptr_ioctl false
		format S16_LE
	}
	hooks.0 {
		type ctl_elems
		hook_args [
			{
				interface MIXER
				name "IEC958 Playback Default"
				lock true
				preserve true
				optional true
				value [ $AES0 $AES1 $AES2 $AES3 ]
			}
		]
	}
}

<confdir:pcm/iec958.conf>

AML-AUGESOUND.pcm.iec958.0 {
	@args [ CARD AES0 AES1 AES2 AES3 ]
	@args.CARD { type string }

name: Build EmuELEC

on:
  workflow_dispatch:
    inputs:
      models:
        description: '要编译的型号列表(空格分隔)，留空则用 repo variable MODELS'
        required: false
        default: ''
  schedule:
    # 每月1号 03:00 UTC 自动全部型号重新编译一次(跟上游同步)
    - cron: '0 3 1 * *'

permissions:
  contents: write

env:
  PROJECT: Amlogic-ce
  DEVICE: Amlogic-no
  ARCH: aarch64
  DISTRO: EmuELEC

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          MODELS="${{ github.event.inputs.models }}"
          if [ -z "$MODELS" ]; then
            MODELS="${{ vars.MODELS }}"
          fi
          if [ -z "$MODELS" ]; then
            MODELS="X98mini"
          fi
          JSON=$(printf '%s\n' $MODELS | jq -R . | jq -s -c .)
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Models to build: $MODELS"

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          # NOTE(w2xg2022): root-reserve-mb太小(1024)，建置跑超過2小時後根目錄(/tmp、
          # runner自己的診斷log等雜項寫入)會慢慢塞滿，最終連runner本身都掛掉(No space
          # left on device寫進runner自己的trace log)。調大給更多餘裕。
          # 8192仍然不夠(2小時後_diag/Worker_*.log累積太大)，調到16384。
          root-reserve-mb: 16384
          swap-size-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Show disk space
        run: df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache downloaded sources
        uses: actions/cache@v4
        with:
          path: sources
          key: sources-${{ hashFiles('**/package.mk') }}
          restore-keys: |
            sources-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            gcc make git unzip wget xz-utils libsdl2-dev libsdl2-mixer-dev \
            libfreeimage-dev libfreetype6-dev libcurl4-openssl-dev rapidjson-dev \
            libasound2-dev libgl1-mesa-dev build-essential libboost-all-dev cmake \
            fonts-droid-fallback libvlc-dev libvlccore-dev vlc-bin texinfo premake4 \
            golang libssl-dev curl patchelf xmlstarlet default-jre xsltproc \
            libvpx-dev rdfind tzdata xfonts-utils lzop \
            libparse-yapp-perl gperf libxml-parser-perl patchutils
          sudo apt-get clean

      - name: Build (${{ matrix.model }})
        run: |
          # NOTE(w2xg2022): /tmp掛在根目錄那個小分區(maximize-build-space沒擴充它，
          # 開局就只剩~100MB)，gcc預設把組譯暫存檔(.s等)寫到/tmp，kernel編譯量大時
          # 會把/tmp塞爆導致"No space left on device"，跟GITHUB_WORKSPACE大容量分區
          # 是否還有空間完全無關。改把TMPDIR指到大容量分區下的目錄。
          # root-reserve-mb從1024調到8192後仍在2小時後爆掉(runner自己的_diag log寫不進去)，
          # 懷疑是某些host端工具(pip/npm/go等)預設快取寫進$HOME(也在根目錄小分區)累積出來的，
          # 連HOME一起搬到大容量分區，徹底排除根目錄小分區的依賴。
          mkdir -p "${{ github.workspace }}/.tmp" "${{ github.workspace }}/.home"
          export TMPDIR="${{ github.workspace }}/.tmp"
          export HOME="${{ github.workspace }}/.home"
          (
            PROJECT=${{ env.PROJECT }} DEVICE=${{ env.DEVICE }} SUBDEVICE=${{ matrix.model }} \
            ARCH=${{ env.ARCH }} DISTRO=${{ env.DISTRO }} TMPDIR="${TMPDIR}" HOME="${HOME}" make image
          ) > build-${{ matrix.model }}.log 2>&1 &
          BUILD_PID=$!

          # 背景磁碟監控：可用空間<8GB時，自動清理已完成套件的build/原始編譯目錄
          # (保留install_pkg/成果，已驗證安全，最終映像組裝讀install_pkg不是build/)
          # NOTE(w2xg2022): maximize-build-space把大容量磁碟掛在GITHUB_WORKSPACE(這裡的CWD)，
          # 不是掛在根目錄"/"！根目錄本來就幾乎全滿跟建置無關，之前一直查"/"等於監控完全失效。
          while kill -0 $BUILD_PID 2>/dev/null; do
            sleep 60
            BUILD_DIR=$(ls -d build.*/ 2>/dev/null | head -1)
            AVAIL_GB=$(df --output=avail . | tail -1 | awk '{print int($1/1024/1024)}')
            echo "[monitor] $(date +%T) disk avail: ${AVAIL_GB}GB"
            if [ "$AVAIL_GB" -lt 15 ] && [ -n "$BUILD_DIR" ] && [ -d "${BUILD_DIR}install_pkg" ]; then
              echo "[monitor] disk low, cleaning completed packages' build/ dirs..."
              CLEANED=0
              for d in $(ls "${BUILD_DIR}install_pkg" 2>/dev/null); do
                if [ -d "${BUILD_DIR}build/$d" ]; then
                  rm -rf "${BUILD_DIR}build/$d"
                  CLEANED=$((CLEANED+1))
                fi
              done
              echo "[monitor] cleaned ${CLEANED} package build dirs"
              df -h .
            fi
          done

          wait $BUILD_PID
          BUILD_EXIT=$?
          tail -100 build-${{ matrix.model }}.log
          exit $BUILD_EXIT

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p out
          find . -maxdepth 3 -type d -name "target" -exec sh -c 'cp -v "$1"/*.img.gz out/ 2>/dev/null; cp -v "$1"/*.img.xz out/ 2>/dev/null; cp -v "$1"/*.tar out/ 2>/dev/null' _ {} \;
          find . -maxdepth 6 -iname "*${{ env.DISTRO }}*${{ matrix.model }}*" \( -iname "*.img.gz" -o -iname "*.img.xz" -o -iname "*.tar" \) -exec cp -v {} out/ \; 2>/dev/null || true
          ls -la out/ || echo "no artifacts found, check build log"

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ matrix.model }}
          path: build-${{ matrix.model }}.log
          retention-days: 14

      - name: Upload firmware artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EmuELEC-${{ matrix.model }}
          path: out/*
          if-no-files-found: warn

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.model }}-${{ github.run_id }}
          name: "EmuELEC ${{ matrix.model }} (${{ github.run_id }})"
          files: out/*
          body: |
            自动云编译：${{ env.PROJECT }}/${{ env.DEVICE }} SUBDEVICE=${{ matrix.model }}
            触发方式：${{ github.event_name }}
